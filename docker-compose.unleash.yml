services:
  unleash-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: ${UNLEASH_DB_PASSWORD:-unleash_local}
    volumes:
      - unleash-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash"]
      interval: 5s
      timeout: 3s
      retries: 5

  unleash:
    image: unleashorg/unleash-server:latest
    depends_on:
      unleash-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://unleash:${UNLEASH_DB_PASSWORD:-unleash_local}@unleash-db:5432/unleash
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: ${UNLEASH_ADMIN_TOKEN:-default:development.unleash-insecure-admin-api-token}
      INIT_CLIENT_API_TOKENS: ${UNLEASH_CLIENT_TOKEN:-default:development.unleash-insecure-client-api-token}
    ports:
      - "${UNLEASH_PORT:-4242}:4242"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4242/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  unleash-db-data:
