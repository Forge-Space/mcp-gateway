sonar.projectKey=Forge-Space_mcp-gateway
sonar.organization=forge-space
sonar.projectName=mcp-gateway

# Sources: Python (tool_router, dribbble_mcp) and TypeScript (src)
sonar.sources=tool_router,dribbble_mcp,src
sonar.tests=tool_router/tests,dribbble_mcp/tests,tests
sonar.test.inclusions=**/test_*.py,**/*_test.py,**/*.test.ts,**/tests/**

# Python coverage (XML format from pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# TypeScript coverage (if LCOV is available)
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/*.pyc,**/coverage/**,**/build/**,**/.venv/**,**/htmlcov/**,**/dist/**
sonar.cpd.exclusions=**/test_*.py,**/*_test.py,**/*.test.ts,**/tests/**

# Version from pyproject.toml
sonar.projectVersion=1.31.0
