name: NPM Release - Core Package

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/npm-release-core.yml"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "README.md"
      - "docs/NPM_DEPLOYMENT_GUIDE.md"
  push:
    tags:
      - "core-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish package to npm"
        required: true
        default: false
        type: boolean
      npm_tag:
        description: "Dist-tag used for workflow_dispatch publish runs"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next

concurrency:
  group: npm-release-core-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  NPM_REGISTRY: "https://registry.npmjs.org"
  PACKAGE_NAME: "@forgespace/mcp-gateway-client"

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Cache npm
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Lint
        run: npm run lint:check

      - name: Type-check
        run: npm run lint:types

      - name: Build
        run: npm run build

      - name: Validate package tarball
        run: npm pack --dry-run

      - name: Extract release metadata
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if [[ "${VERSION}" == *-* ]]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "Package version: ${VERSION}"

  dry-run:
    name: Dry run release
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.publish != true)
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Cache npm
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Build
        run: npm run build

      - name: Simulate publish
        run: npm publish --dry-run --access public

  publish:
    name: Publish package
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    environment:
      name: npm
      url: https://www.npmjs.com/package/@forgespace/mcp-gateway-client
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Cache npm
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Build
        run: npm run build

      - name: Verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::error::NPM_TOKEN is required for publish runs."
            exit 1
          fi
          npm whoami >/dev/null

      - name: Verify scope access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if ! npm access list packages @forgespace --json >/tmp/npm-scope.json 2>/tmp/npm-scope.err; then
            cat /tmp/npm-scope.err >&2
            echo "::warning::Scope preflight could not confirm @forgespace access."
            echo "::warning::Continuing to publish step for definitive auth/publish error."
          else
            echo "Scope preflight succeeded."
          fi

      - name: Fail if version already exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "::error::Version ${VERSION} already exists on npm."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DIST_TAG="latest"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DIST_TAG="${{ inputs.npm_tag }}"
          elif [[ "${{ needs.validate.outputs.is_prerelease }}" == "true" ]]; then
            DIST_TAG="next"
          fi
          echo "Publishing ${PACKAGE_NAME}@${{ needs.validate.outputs.version }} with dist-tag ${DIST_TAG}"
          npm publish --access public --tag "${DIST_TAG}"

      - name: Verify published package resolvability
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          FOUND=0
          for ATTEMPT in $(seq 1 12); do
            RESOLVED="$(npm view "${PACKAGE_NAME}@${VERSION}" version 2>/dev/null || true)"
            if [[ "${RESOLVED}" == "${VERSION}" ]]; then
              FOUND=1
              break
            fi
            sleep 10
          done

          if [[ "${FOUND}" -ne 1 ]]; then
            echo "::error::Published version did not resolve from npm registry."
            exit 1
          fi

          CLI_OK=0
          CLI_ERROR_FILE="$(mktemp)"
          for ATTEMPT in $(seq 1 6); do
            if npx -y "${PACKAGE_NAME}@${VERSION}" \
              --url="http://127.0.0.1:4444/servers/release-smoke/mcp" \
              --help >/tmp/npx-help.txt 2>"${CLI_ERROR_FILE}"; then
              CLI_OK=1
              break
            fi
            sleep 5
          done

          if [[ "${CLI_OK}" -ne 1 ]]; then
            if [[ -s "${CLI_ERROR_FILE}" ]]; then
              cat "${CLI_ERROR_FILE}" >&2
            fi
            echo "::error::Published package CLI smoke check failed."
            exit 1
          fi
