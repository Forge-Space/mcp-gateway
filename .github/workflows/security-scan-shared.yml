name: Security Scanning (Shared)

on:
  workflow_call:
    inputs:
      project-type:
        description: "Type of project (gateway, webapp, mcp, patterns)"
        required: false
        default: "patterns"
        type: string
      node-version:
        description: "Node.js version to use"
        required: false
        default: "22"
        type: string
      python-version:
        description: "Python version to use"
        required: false
        default: "3.12"
        type: string
      severity-threshold:
        description: "Security severity threshold"
        required: false
        default: "high"
        type: string
      enable-codeql:
        description: "Enable CodeQL analysis"
        required: false
        default: true
        type: boolean
      enable-secrets:
        description: "Enable secret scanning"
        required: false
        default: true
        type: boolean
      timeout-minutes:
        description: "Default timeout for security jobs"
        required: false
        default: 15
        type: number

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # CodeQL Analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    if: inputs.enable-codeql
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      matrix:
        language: ["javascript", "typescript", "python"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@0d579ffd059c29b07949a3cce3983f0780820c98

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98
        with:
          category: "/language:${{matrix.language}}"

  # Secret Scanning
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: inputs.enable-secrets

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@6c05c4a00b91aa542267d8e32a8254774799d68d
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified
          fail: false

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Checking for common secret patterns..."

          # Check for common secret patterns
          if grep -r -i "password\|secret\|token\|key\|api_key" --include="*.js" --include="*.ts" --include="*.py" --include="*.json" --include="*.yml" --include="*.yaml" . | grep -v "node_modules\|\.git\|test\|example"; then
            echo "⚠️ Potential hardcoded secrets found"
          else
            echo "✅ No obvious hardcoded secrets found"
          fi

  # Dependency Audit
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        if: inputs.project-type != 'gateway'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Setup Python
        if: inputs.project-type == 'gateway' || inputs.project-type == 'mcp'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: npm audit
        if: inputs.project-type != 'gateway'
        run: |
          npm ci --legacy-peer-deps
          npm audit --audit-level=high
        continue-on-error: true

      - name: pip audit
        if: inputs.project-type == 'gateway' || inputs.project-type == 'mcp'
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e . 2>/dev/null || true
          pip-audit --format=json --output=audit-results.json || true
        continue-on-error: true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: audit-results
          path: audit-results.json
          retention-days: 30

  # Security Summary
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [codeql, secret-scan, dependency-audit]
    if: always()

    steps:
      - name: Security Scan Summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ${{ needs.codeql.result }} | ✅ Passed or ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | ${{ needs.secret-scan.result }} | ✅ Passed or ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} | ✅ Passed or ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Security Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- **Project Type**: ${{ inputs.project-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Languages**: Node.js, Python, TypeScript" >> $GITHUB_STEP_SUMMARY
          echo "- **Scan Frequency**: Event-driven + scheduled" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall security status
          if [[ "${{ needs.codeql.result }}" == "success" && "${{ needs.secret-scan.result }}" == "success" ]]; then
            echo "✅ All security checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some security checks require attention" >> $GITHUB_STEP_SUMMARY
            echo "🔍 Review the Security tab for detailed findings" >> $GITHUB_STEP_SUMMARY
          fi
