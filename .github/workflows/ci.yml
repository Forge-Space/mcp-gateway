name: CI Pipeline

on:
  push:
    branches: [main, dev, release/*, feature/*, feat/*]
  pull_request:
    branches: [main, dev, release/*, feature/*, feat/*]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: Forge-Space/.github/.github/actions/setup-python@main

      - name: Ruff check
        run: ruff check tool_router/ dribbble_mcp/ --output-format=github

      - name: Ruff format check
        run: ruff format --check tool_router/ dribbble_mcp/

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: Forge-Space/.github/.github/actions/setup-python@main

      - name: Run tests
        run: |
          pytest tool_router/tests/ dribbble_mcp/tests/ \
            --ignore=tool_router/tests/performance \
            --timeout=30 --maxfail=10

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v6

      - uses: Forge-Space/.github/.github/actions/setup-python@main
        with:
          install-command: "pip install build"

      - name: Build package
        run: python -m build

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: Forge-Space/.github/.github/actions/setup-python@main

      - name: Run mypy
        run: mypy tool_router/ --config-file pyproject.toml || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: Forge-Space/.github/.github/actions/setup-python@main

      - name: pip audit
        run: pip install pip-audit && pip-audit || true

      - name: Bandit security scan
        run: pip install bandit && bandit -r tool_router/ -ll -ii || true

  test-autogen-warn:
    name: Test Autogen (Warn)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run test-autogen parity check
        uses: Forge-Space/forge-ai-action@484c056b923dcd1b8f43c5a18dfa147c77bcb23b
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: test-autogen-check
          test_autogen_phase: warn
          comment: true
          annotations: true

  workflow-summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, build, typecheck, security, test-autogen-warn]

    steps:
      - name: Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Autogen (Warn) | ${{ needs.test-autogen-warn.result }} |" >> $GITHUB_STEP_SUMMARY
