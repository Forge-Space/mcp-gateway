name: CI Pipeline

on:
  push:
    branches: [main, dev, release/*, feature/*, feat/*]
  pull_request:
    branches: [main, dev, release/*, feature/*, feat/*]

env:
  PYTHON_VERSION: "3.12"

jobs:
  tenant-decoupling:
    name: Tenant Decoupling
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"
      - name: Ensure ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi
      - name: Validate tenant decoupling
        run: npm run check:tenant-decoupling

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Bridge drift guard
        run: bash scripts/utils/check-bridge-drift.sh

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95

      - name: Ruff check
        run: ruff check tool_router/ dribbble_mcp/ --output-format=github

      - name: Ruff format check
        run: ruff format --check tool_router/ dribbble_mcp/

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95

      - name: Run tests
        run: |
          # tests/test_security.py is excluded: tests are stale (written against
          # the pre-refactor security API). See TODO: update or remove.
          pytest tool_router/tests/ dribbble_mcp/tests/ tests/ \
            --ignore=tool_router/tests/performance \
            --ignore=tests/test_rag_manager.py \
            --ignore=tests/test_security.py \
            --ignore=tests/test_specialist_integration.py \
            --ignore=tests/test_github_workflows.py \
            --ignore=tests/test_scalable_architecture.py \
            --timeout=30 --maxfail=10

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, test]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95
        with:
          install-command: "pip install build"

      - name: Build package
        run: python -m build

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95

      - name: Run mypy
        run: mypy tool_router/ --config-file pyproject.toml || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95

      - name: pip audit
        run: pip install pip-audit && pip-audit || true

      - name: Bandit security scan
        run: pip install bandit && bandit -r tool_router/ -ll -ii || true

  test-autogen-warn:
    name: Test Autogen (Warn)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"
      - name: Detect tenant profile availability
        id: tenant_profile_check
        shell: bash
        run: |
          PROFILE=".forge/tenant-profile.yml"
          if [[ ! -f "${PROFILE}" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "reason=inline-tenant-profile-missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TENANT_ID=$(grep '^tenant_id:' "${PROFILE}" | awk '{print $2}')
          if [[ -z "${TENANT_ID}" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "reason=tenant-id-not-found-in-profile" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "reason=available" >> "$GITHUB_OUTPUT"
          echo "tenant_id=${TENANT_ID}" >> "$GITHUB_OUTPUT"

      - name: Run test-autogen parity check
        if: steps.tenant_profile_check.outputs.available == 'true'
        uses: Forge-Space/forge-ai-action@1db6524858b544cb8051a4510e835d67818b24a2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: test-autogen-check
          tenant: ${{ steps.tenant_profile_check.outputs.tenant_id }}
          tenant_profile_ref: .forge/tenant-profile.yml
          test_autogen_phase: warn
          comment: true
          annotations: true
      - name: Skip parity when tenant profile context is unavailable
        if: steps.tenant_profile_check.outputs.available != 'true'
        run: |
          echo "Skipping test-autogen parity: ${{ steps.tenant_profile_check.outputs.reason }}."

  workflow-summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [tenant-decoupling, lint, test, build, typecheck, security, test-autogen-warn]

    steps:
      - name: Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tenant Decoupling | ${{ needs.tenant-decoupling.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Autogen (Warn) | ${{ needs.test-autogen-warn.result }} |" >> $GITHUB_STEP_SUMMARY
