name: CI Pipeline

on:
  push:
    branches: [main, dev, release/*, feature/*, feat/*]
  pull_request:
    branches: [main, dev, release/*, feature/*, feat/*]

env:
  PYTHON_VERSION: "3.12"

jobs:
  tenant-decoupling:
    name: Tenant Decoupling
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Ensure ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi
      - name: Validate tenant decoupling
        run: npm run check:tenant-decoupling

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Bridge drift guard
        run: bash scripts/utils/check-bridge-drift.sh

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95

      - name: Ruff check
        run: ruff check tool_router/ dribbble_mcp/ --output-format=github

      - name: Ruff format check
        run: ruff format --check tool_router/ dribbble_mcp/

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95

      - name: Run tests
        run: |
          pytest tool_router/tests/ dribbble_mcp/tests/ \
            --ignore=tool_router/tests/performance \
            --timeout=30 --maxfail=10

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, test]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95
        with:
          install-command: "pip install build"

      - name: Build package
        run: python -m build

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95

      - name: Run mypy
        run: mypy tool_router/ --config-file pyproject.toml || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: Forge-Space/.github/.github/actions/setup-python@6fbe56bc610ddf84b70f213c752b95196bcadd95

      - name: pip audit
        run: pip install pip-audit && pip-audit || true

      - name: Bandit security scan
        run: pip install bandit && bandit -r tool_router/ -ll -ii || true

  test-autogen-warn:
    name: Test Autogen (Warn)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: Forge-Space/forge-tenant-profiles
          path: .forge-tenant-profiles
          token: ${{ secrets.FORGE_TENANT_PROFILES_READ_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Validate tenant context
        shell: bash
        env:
          FORGE_TENANT_ID: ${{ vars.FORGE_TENANT_ID }}
          FORGE_TENANT_PROFILE_REF: ${{ vars.FORGE_TENANT_PROFILE_REF }}
        run: |
          if [[ -z "${FORGE_TENANT_ID}" ]]; then
            echo "::error::Missing required repo variable FORGE_TENANT_ID."
            exit 1
          fi
          if [[ -z "${FORGE_TENANT_PROFILE_REF}" ]]; then
            echo "::error::Missing required repo variable FORGE_TENANT_PROFILE_REF."
            exit 1
          fi
          if [[ ! -f "${FORGE_TENANT_PROFILE_REF}" ]]; then
            echo "::error::Tenant profile not found at ${FORGE_TENANT_PROFILE_REF}."
            exit 1
          fi

      - name: Run test-autogen parity check
        uses: Forge-Space/forge-ai-action@1db6524858b544cb8051a4510e835d67818b24a2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: test-autogen-check
          tenant: ${{ vars.FORGE_TENANT_ID }}
          tenant_profile_ref: ${{ vars.FORGE_TENANT_PROFILE_REF }}
          test_autogen_phase: warn
          comment: true
          annotations: true

  workflow-summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [tenant-decoupling, lint, test, build, typecheck, security, test-autogen-warn]

    steps:
      - name: Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tenant Decoupling | ${{ needs.tenant-decoupling.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Autogen (Warn) | ${{ needs.test-autogen-warn.result }} |" >> $GITHUB_STEP_SUMMARY
